<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSP ละหานทราย - ระบบติดตามความก้าวหน้า</title>
    
    <!-- Tailwind CSS (สำหรับจัดหน้าตาและสีสัน) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (สำหรับไอคอนต่างๆ) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (ฟอนต์ภาษาไทย Prompt เพื่อความสวยงาม) -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM (สำหรับระบบการทำงานของเว็บ) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (สำหรับแปลงโค้ด React ให้ทำงานบนเบราว์เซอร์ได้โดยตรง) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; }
        /* ซ่อน Scrollbar สำหรับบางจุดเพื่อให้ดูสะอาดตา */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-100 selection:bg-indigo-300">

    <!-- จุดที่ React จะนำแอปมาแสดงผล -->
    <div id="root"></div>

    <!-- โค้ดระบบหลัก -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // ข้อมูลจำลองจาก PDF (ตัวชี้วัด WSP ปี 2568 ระดับ กปภ.สาขา)
        const initialData = [
          {
            id: 1,
            title: "1. การจัดตั้งทีมงาน (Assemble the WSP team)",
            icon: "fa-solid fa-users",
            tasks: [
              { id: "1.1", text: "เอกสารจัดตั้งทีมงาน WSP เป็นปัจจุบันและถูกต้อง", completed: true },
              { id: "1.2", text: "รายชื่อผู้มีส่วนได้ส่วนเสียสอดคล้องตามความเสี่ยง", completed: true },
              { id: "1.3", text: "สมาชิกหรือรายชื่อผู้ติดต่อมีความเชี่ยวชาญกับความเสี่ยง", completed: false },
              { id: "1.4", text: "ทีมงานประชุมตามแผนที่กำหนดและหลังจากเกิดเหตุ", completed: false },
              { id: "1.5", text: "มีการรายงานผลการประชุม WSP ให้พนักงานทราบ", completed: false },
              { id: "1.6", text: "บันทึกการประชุม ความก้าวหน้าในการดำเนินงาน", completed: false }
            ]
          },
          {
            id: 2,
            title: "2. การสำรวจวินิจฉัยระบบประปา (Describe the water supply system)",
            icon: "fa-solid fa-droplet",
            tasks: [
              { id: "2.1", text: "การอธิบายระบบประปาครบถ้วนถูกต้อง", completed: false },
              { id: "2.2", text: "Process Flow diagram ครบถ้วน เป็นปัจจุบัน ตั้งแต่แหล่งน้ำถึงผู้ใช้น้ำ", completed: false },
              { id: "2.3", text: "การอธิบายอุบัติการณ์หรือความเสี่ยง", completed: false },
              { id: "2.4", text: "การสำรวจความพร้อมใช้งานของระบบประปา", completed: false }
            ]
          },
          {
            id: 3,
            title: "3. การระบุความเสี่ยง ประเมินและทวนสอบ (Identify hazards & assess risks)",
            icon: "fa-solid fa-triangle-exclamation",
            tasks: [
              { id: "3.1", text: "ระบุอันตรายและเหตุการณ์อันตรายได้ครบถ้วนทั้ง 3 ระบบ", completed: false },
              { id: "3.2", text: "การระบุมาตรการควบคุมที่มีอยู่", completed: false },
              { id: "3.3", text: "การทวนสอบมาตรการควบคุมที่มีอยู่", completed: false },
              { id: "3.4", text: "ประเมินความเสี่ยง โดยพิจารณาร่วมกับมาตรการควบคุมที่มีอยู่", completed: false },
              { id: "3.5", text: "จัดลำดับความสำคัญของความเสี่ยงที่มีนัยสำคัญ", completed: false }
            ]
          },
          {
            id: 4,
            title: "4. แผนปรับปรุงพัฒนา (Improvement/upgrade plan)",
            icon: "fa-solid fa-chart-column",
            tasks: [
              { id: "4.1", text: "จัดทำแผนปรับปรุงสำหรับความเสี่ยงที่สำคัญที่ควบคุมไม่ได้", completed: false },
              { id: "4.2", text: "แผนปรับปรุงมีความชัดเจนสอดคล้องกับผลประเมิน", completed: false },
              { id: "4.3", text: "การดำเนินงานตามแผนปรับปรุง", completed: false }
            ]
          },
          {
            id: 5,
            title: "5. การดำเนินการตามมาตรการควบคุม (Monitoring control measures)",
            icon: "fa-solid fa-chart-line",
            tasks: [
              { id: "5.1", text: "จัดทำแผนติดตามการปฏิบัติงานครอบคลุมมาตรการแก้ไข", completed: false },
              { id: "5.2", text: "บันทึกติดตามให้เห็นว่าการปฏิบัติงานเป็นไปตามแผน", completed: false },
              { id: "5.3", text: "ตรวจทานประสิทธิภาพแผนการแก้ไข", completed: false }
            ]
          },
          {
            id: 6,
            title: "6. การบริหารจัดการและแผนสนับสนุน (Management procedures)",
            icon: "fa-solid fa-file-lines",
            tasks: [
              { id: "6.1", text: "ทบทวนปรับปรุงคู่มือปฏิบัติงานให้เป็นปัจจุบัน", completed: false },
              { id: "6.2", text: "ดำเนินการสอบทาน", completed: false },
              { id: "6.3", text: "แผนการจัดการในภาวะฉุกเฉิน (Emergency response plan)", completed: false },
              { id: "6.4", text: "ปรับปรุงพื้นที่ระบบประปาให้สะอาดเรียบร้อย ปลอดภัย (5ส)", completed: false },
              { id: "6.5", text: "พนักงานได้รับการฝึกอบรม/พัฒนาทักษะด้านระบบประปา", completed: false }
            ]
          },
          {
            id: 7,
            title: "7. การทบทวนและปรับปรุง WSP (Review of the WSP)",
            icon: "fa-solid fa-arrows-rotate",
            tasks: [
              { id: "7.1", text: "กำหนดตารางเวลาการทบทวนและแก้ไข WSP เป็นประจำ", completed: false },
              { id: "7.2", text: "ทบทวนและแก้ไข WSP ตามที่กำหนดไว้", completed: false }
            ]
          }
        ];

        function App() {
          const [categories, setCategories] = useState(initialData);
          const [expandedCats, setExpandedCats] = useState([1]);
          const [toast, setToast] = useState(null);
          const [isSummaryOpen, setIsSummaryOpen] = useState(false);

          // คำนวณความคืบหน้า
          const totalTasks = categories.reduce((sum, cat) => sum + cat.tasks.length, 0);
          const completedTasks = categories.reduce((sum, cat) => 
            sum + cat.tasks.filter(t => t.completed).length, 0
          );
          const overallProgress = Math.round((completedTasks / totalTasks) * 100) || 0;
          
          // คำนวณคะแนนคาดการณ์ (อ้างอิงหมวดกระบวนการ 70 คะแนนเต็ม)
          const maxScore = 70;
          const estimatedScore = ((completedTasks / totalTasks) * maxScore).toFixed(1);

          // Toggle Accordion
          const toggleCategory = (id) => {
            setExpandedCats(prev => 
              prev.includes(id) ? prev.filter(catId => catId !== id) : [...prev, id]
            );
          };

          // Toggle Checkbox
          const toggleTask = (catId, taskId) => {
            setCategories(prev => prev.map(cat => {
              if (cat.id !== catId) return cat;
              return {
                ...cat,
                tasks: cat.tasks.map(task => 
                  task.id === taskId ? { ...task, completed: !task.completed } : task
                )
              };
            }));
          };

          // จัดการหมายเหตุ
          const handleCategoryRemarkChange = (catId, text) => {
            setCategories(prev => prev.map(cat => 
              cat.id === catId ? { ...cat, remark: text } : cat
            ));
          };

          const handleTaskRemarkChange = (catId, taskId, text) => {
            setCategories(prev => prev.map(cat => {
              if (cat.id !== catId) return cat;
              return {
                ...cat,
                tasks: cat.tasks.map(task => 
                  task.id === taskId ? { ...task, remark: text } : task
                )
              };
            }));
          };

          // แจ้งเตือน
          const handleRemind = (taskText) => {
            setToast({
              title: 'แจ้งเตือนเร่งรัดงานแล้ว',
              message: `ระบบได้ส่งข้อความไฮเทคถึงผู้รับผิดชอบหัวข้อ "${taskText}"`,
              type: 'success'
            });
            setTimeout(() => setToast(null), 3500);
          };

          // ฟังก์ชันคัดลอกข้อความ
          const handleCopy = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
              document.execCommand('copy');
              setToast({
                title: 'คัดลอกสำเร็จ',
                message: 'คัดลอกข้อมูลลงคลิปบอร์ดพร้อมใช้งาน',
                type: 'success'
              });
              setTimeout(() => setToast(null), 3000);
            } catch (err) {
              console.error('Failed to copy', err);
            }
            document.body.removeChild(textArea);
          };

          // ดึงรายการงานทั้งหมดเพื่อแสดงในสรุป
          const allPendingTasks = categories.flatMap(cat => 
            cat.tasks.filter(t => !t.completed).map(t => ({ ...t, catTitle: cat.title, catId: cat.id }))
          );
          const allCompletedTasks = categories.flatMap(cat => 
            cat.tasks.filter(t => t.completed).map(t => ({ ...t, catTitle: cat.title, catId: cat.id }))
          );

          return (
            <div className="min-h-screen text-slate-800 pb-24">
              
              {/* Premium Glassmorphism Header */}
              <header className="sticky top-0 z-30 bg-white/70 backdrop-blur-xl border-b border-white/50 shadow-[0_4px_30px_rgba(0,0,0,0.05)]">
                <div className="max-w-3xl mx-auto px-4 py-3 md:py-4 flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    {/* 3D Logo Icon */}
                    <div className="relative group">
                      <div className="absolute inset-0 bg-cyan-400 blur-md opacity-50 group-hover:opacity-75 transition-opacity"></div>
                      <div className="relative bg-gradient-to-br from-cyan-400 via-blue-500 to-indigo-600 p-2 md:p-3 rounded-2xl flex items-center justify-center shadow-[inset_0_2px_4px_rgba(255,255,255,0.4),0_4px_10px_rgba(59,130,246,0.5)] border border-blue-400/50">
                        <i className="fa-solid fa-droplet text-white drop-shadow-md text-lg"></i>
                      </div>
                    </div>
                    <div>
                      <h1 className="text-xl md:text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-800 to-blue-600 tracking-tight">WSP ละหานทราย</h1>
                      <p className="text-slate-500 text-xs md:text-sm font-semibold tracking-wide">โครงการจัดการน้ำสะอาด กปภ.สาขาละหานทราย</p>
                    </div>
                  </div>
                </div>
              </header>

              {/* Main Content */}
              <main className="max-w-3xl mx-auto px-4 mt-6">
                
                {/* Luxury Dashboard Card */}
                <section className="relative bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-900 rounded-3xl p-6 md:p-8 mb-8 shadow-[0_15px_40px_-10px_rgba(49,46,129,0.7)] overflow-hidden border border-indigo-500/30">
                  {/* Glowing Orbs Background */}
                  <div className="absolute -top-10 -right-10 w-48 h-48 rounded-full bg-indigo-500/40 blur-[50px] pointer-events-none"></div>
                  <div className="absolute -bottom-10 -left-10 w-40 h-40 rounded-full bg-cyan-500/30 blur-[40px] pointer-events-none"></div>
                  
                  <div className="relative z-10">
                    <div className="flex justify-between items-end mb-5">
                      <div>
                        <h2 className="text-indigo-100 text-sm md:text-base font-medium mb-1 flex items-center gap-2">
                          <i className="fa-solid fa-wand-magic-sparkles text-cyan-400"></i>
                          ความก้าวหน้าโครงการ
                        </h2>
                        <div className="flex items-baseline gap-2 text-white drop-shadow-[0_2px_10px_rgba(255,255,255,0.3)]">
                          <span className="text-5xl md:text-6xl font-black tracking-tighter">{overallProgress}%</span>
                        </div>
                      </div>
                      
                      <div className="text-right flex flex-col items-end gap-3">
                        <span className="inline-flex items-center justify-center bg-white/10 backdrop-blur-md text-cyan-50 text-xs font-bold px-4 py-2 rounded-xl border border-white/10 shadow-[inset_0_1px_1px_rgba(255,255,255,0.2)]">
                          {completedTasks} / {totalTasks} งาน
                        </span>
                        
                        {/* 3D Embossed Summary Button */}
                        <button 
                          onClick={() => setIsSummaryOpen(true)}
                          className="group relative inline-flex items-center justify-center gap-2 bg-gradient-to-b from-indigo-400 to-indigo-600 text-white text-xs md:text-sm font-bold px-5 py-2.5 rounded-xl border border-indigo-400/50 shadow-[0_5px_0_rgb(55,48,163),0_10px_20px_rgba(67,56,202,0.5)] active:shadow-[0_0px_0_rgb(55,48,163),0_0px_0_rgba(67,56,202,0.5)] active:translate-y-[5px] transition-all duration-150"
                        >
                          <i className="fa-solid fa-clipboard-list drop-shadow-md group-active:scale-95"></i>
                          ดูสรุปรายงาน
                        </button>
                      </div>
                    </div>
                    
                    {/* Hi-Tech Progress Bar */}
                    <div className="w-full bg-slate-900/50 rounded-full h-3 md:h-4 mt-2 overflow-hidden border border-white/10 shadow-[inset_0_2px_4px_rgba(0,0,0,0.5)]">
                      <div 
                        className="h-full rounded-full transition-all duration-1000 ease-out relative bg-gradient-to-r from-cyan-400 via-blue-500 to-indigo-500 shadow-[0_0_15px_rgba(56,189,248,0.7)]"
                        style={{ width: `${overallProgress}%` }}
                      >
                        {/* Glossy reflection on progress bar */}
                        <div className="absolute top-0 left-0 right-0 h-1/2 bg-gradient-to-b from-white/40 to-transparent rounded-full"></div>
                      </div>
                    </div>
                  </div>
                </section>

                {/* Categories List */}
                <section className="space-y-5">
                  {categories.map(cat => {
                    const catTotal = cat.tasks.length;
                    const catCompleted = cat.tasks.filter(t => t.completed).length;
                    const catProgress = Math.round((catCompleted / catTotal) * 100);
                    const isExpanded = expandedCats.includes(cat.id);
                    const isAllDone = catCompleted === catTotal;

                    return (
                      <div 
                        key={cat.id} 
                        className={`rounded-3xl transition-all duration-300 overflow-hidden border backdrop-blur-sm ${
                          isAllDone 
                            ? 'bg-gradient-to-br from-emerald-50 to-white border-emerald-200 shadow-[0_8px_20px_-10px_rgba(16,185,129,0.2)]' 
                            : isExpanded 
                              ? 'bg-white border-indigo-200 shadow-[0_15px_30px_-10px_rgba(79,70,229,0.15)] ring-1 ring-indigo-100' 
                              : 'bg-white border-slate-200/80 shadow-sm hover:shadow-md'
                        }`}
                      >
                        
                        {/* Category Header */}
                        <div 
                          className={`p-4 md:p-5 flex items-center justify-between cursor-pointer transition-all duration-300 ${
                            isExpanded && !isAllDone ? 'bg-gradient-to-r from-indigo-50/50 to-transparent' : ''
                          }`}
                          onClick={() => toggleCategory(cat.id)}
                        >
                          <div className="flex items-center gap-4 flex-1">
                            {/* Category Icon */}
                            <div className={`w-12 h-12 flex items-center justify-center rounded-2xl transition-all duration-500 shadow-[inset_0_2px_3px_rgba(255,255,255,0.6)] border ${
                              isAllDone 
                                ? 'bg-gradient-to-br from-emerald-400 to-emerald-500 text-white border-emerald-400 shadow-[0_5px_15px_rgba(16,185,129,0.4)]' 
                                : isExpanded 
                                  ? 'bg-gradient-to-br from-indigo-500 to-blue-600 text-white border-indigo-400 shadow-[0_5px_15px_rgba(79,70,229,0.4)]' 
                                  : 'bg-gradient-to-br from-slate-100 to-slate-200 text-slate-500 border-white'
                            }`}>
                              <i className={`${cat.icon} text-lg`}></i>
                            </div>
                            <div className="flex-1 pr-2">
                              <h3 className={`font-bold text-sm md:text-base leading-tight mb-2 transition-colors ${
                                isAllDone ? 'text-emerald-800' : isExpanded ? 'text-indigo-900' : 'text-slate-700'
                              }`}>
                                {cat.title}
                              </h3>
                              
                              {/* Sub-progress bar */}
                              <div className="flex items-center gap-3">
                                <div className="w-full max-w-[150px] bg-slate-200/70 rounded-full h-2 overflow-hidden shadow-[inset_0_1px_2px_rgba(0,0,0,0.1)]">
                                  <div 
                                    className={`h-full rounded-full transition-all duration-700 relative ${
                                      isAllDone 
                                        ? 'bg-gradient-to-r from-emerald-400 to-green-500' 
                                        : 'bg-gradient-to-r from-cyan-400 to-indigo-500'
                                    }`}
                                    style={{ width: `${catProgress}%` }}
                                  >
                                     <div className="absolute top-0 left-0 right-0 h-1/2 bg-white/30 rounded-full"></div>
                                  </div>
                                </div>
                                <span className="text-xs font-bold text-slate-500 bg-slate-100 px-2 py-0.5 rounded-md">{catProgress}%</span>
                              </div>
                            </div>
                          </div>
                          <div className={`w-9 h-9 rounded-xl flex items-center justify-center transition-all shadow-sm border border-white ${
                            isExpanded 
                              ? 'bg-indigo-100 text-indigo-700 shadow-[inset_0_2px_4px_rgba(0,0,0,0.05)]' 
                              : 'bg-slate-50 text-slate-400'
                          }`}>
                            <i className={`fa-solid ${isExpanded ? 'fa-chevron-up' : 'fa-chevron-down'}`}></i>
                          </div>
                        </div>

                        {/* Tasks List (Accordion Content) */}
                        <div className={`transition-all duration-400 ease-in-out origin-top ${isExpanded ? 'opacity-100 max-h-[3000px]' : 'opacity-0 max-h-0 hidden'}`}>
                          <div className="px-3 pb-4 md:px-5 md:pb-6 pt-1">
                            
                            {/* Category Remark */}
                            {!isAllDone && (
                              <div className="mb-5 bg-gradient-to-br from-orange-50 to-amber-50/30 border border-orange-200/60 p-4 rounded-2xl shadow-[inset_0_1px_0_rgba(255,255,255,1)]">
                                <label className="text-xs md:text-sm font-bold text-orange-700 mb-2 flex items-center gap-1.5">
                                  <i className="fa-solid fa-triangle-exclamation text-orange-500"></i>
                                  ปัญหา/หมายเหตุ (ภาพรวมหมวดหมู่)
                                </label>
                                <textarea 
                                  className="w-full text-sm p-3.5 bg-white border border-orange-200 rounded-xl focus:ring-2 focus:ring-orange-400 focus:border-transparent outline-none transition-all resize-none shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)] placeholder:text-slate-300"
                                  rows="2"
                                  placeholder="ระบุสาเหตุที่หมวดหมู่นี้ยังดำเนินการไม่ครบถ้วน..."
                                  value={cat.remark || ""}
                                  onChange={(e) => handleCategoryRemarkChange(cat.id, e.target.value)}
                                />
                              </div>
                            )}

                            <div className="space-y-3">
                              {cat.tasks.map(task => (
                                <div 
                                  key={task.id} 
                                  className={`relative p-4 md:p-5 rounded-2xl transition-all duration-300 border ${
                                    task.completed 
                                      ? 'border-emerald-200 bg-emerald-50/50 shadow-[inset_0_1px_0_rgba(255,255,255,1)]' 
                                      : 'border-slate-200 bg-white shadow-[0_2px_8px_rgba(0,0,0,0.02)] hover:shadow-[0_8px_20px_rgba(0,0,0,0.06)] hover:border-indigo-200'
                                  }`}
                                >
                                  <div 
                                    className="flex items-start gap-4 cursor-pointer group"
                                    onClick={() => toggleTask(cat.id, task.id)}
                                  >
                                    {/* 3D Embossed Checkbox */}
                                    <button className={`mt-0.5 flex-shrink-0 w-7 h-7 md:w-8 md:h-8 rounded-full flex items-center justify-center transition-all duration-300 ${
                                      task.completed 
                                        ? 'bg-gradient-to-br from-emerald-400 to-green-600 border border-emerald-400 text-white shadow-[inset_0_2px_4px_rgba(255,255,255,0.5),0_0_15px_rgba(16,185,129,0.5)] scale-100' 
                                        : 'bg-gradient-to-br from-slate-50 to-slate-200 border border-slate-300 text-transparent shadow-[inset_0_2px_5px_rgba(0,0,0,0.1),0_2px_5px_rgba(0,0,0,0.05)] group-hover:border-indigo-400 scale-95 group-hover:scale-100'
                                    }`}>
                                      <i className="fa-solid fa-check text-sm drop-shadow-md"></i>
                                    </button>
                                    
                                    <div className="flex-1 min-w-0">
                                      <p className={`text-sm md:text-base leading-relaxed transition-colors ${
                                        task.completed ? 'text-slate-400 line-through' : 'text-slate-800 font-semibold'
                                      }`}>
                                        <span className={`inline-block px-2 py-0.5 rounded-md text-[10px] font-black mr-2 align-middle border shadow-[inset_0_1px_0_rgba(255,255,255,0.5)] ${
                                          task.completed ? 'bg-slate-100 text-slate-400 border-slate-200' : 'bg-gradient-to-b from-indigo-50 to-indigo-100 text-indigo-700 border-indigo-200'
                                        }`}>
                                          {task.id}
                                        </span>
                                        {task.text}
                                      </p>

                                      {/* Task Remark & Actions */}
                                      {!task.completed && (
                                        <div className="mt-4 flex flex-col sm:flex-row sm:items-center gap-3" onClick={e => e.stopPropagation()}>
                                          
                                          {/* Remark Input */}
                                          <div className="flex-1 relative">
                                            <div className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                              <i className="fa-solid fa-file-lines text-slate-400 text-sm"></i>
                                            </div>
                                            <input 
                                              type="text"
                                              className="block w-full pl-9 pr-4 py-2.5 text-xs md:text-sm border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400 outline-none transition-all placeholder:text-slate-400 shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)]"
                                              placeholder="เพิ่มหมายเหตุย่อย..."
                                              value={task.remark || ""}
                                              onChange={(e) => handleTaskRemarkChange(cat.id, task.id, e.target.value)}
                                            />
                                          </div>

                                          {/* 3D Embossed Remind Button */}
                                          <button 
                                            onClick={(e) => {
                                              e.stopPropagation();
                                              handleRemind(task.text);
                                            }}
                                            className="group relative inline-flex items-center justify-center gap-1.5 px-5 py-2.5 bg-gradient-to-b from-amber-400 to-orange-500 text-white border border-amber-300/50 rounded-xl text-xs md:text-sm font-bold transition-all shrink-0 shadow-[0_4px_0_rgb(194,65,12),0_8px_15px_rgba(245,158,11,0.4)] active:shadow-[0_0px_0_rgb(194,65,12),0_0px_0_rgba(245,158,11,0.4)] active:translate-y-[4px]"
                                          >
                                            <i className="fa-solid fa-bell drop-shadow-sm group-active:scale-95"></i>
                                            <span>เร่งรัดงาน</span>
                                          </button>
                                        </div>
                                      )}
                                    </div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </section>
              </main>

              {/* Modern Floating Toast Notification */}
              {toast && (
                <div className="fixed bottom-6 left-0 right-0 px-4 z-[70] flex justify-center pointer-events-none transition-all duration-300">
                  <div className="bg-slate-900/90 backdrop-blur-xl text-white p-4 md:p-5 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex items-center gap-4 max-w-md w-full border border-slate-700/50 pointer-events-auto transform translate-y-0 opacity-100">
                    <div className="bg-gradient-to-br from-emerald-400 to-green-600 text-white p-3 rounded-xl shrink-0 shadow-[0_0_15px_rgba(16,185,129,0.5)] border border-emerald-400/50 flex items-center justify-center">
                      <i className="fa-solid fa-circle-check text-xl"></i>
                    </div>
                    <div className="flex-1 min-w-0">
                      <h4 className="font-bold text-sm md:text-base text-white truncate">{toast.title}</h4>
                      <p className="text-slate-300 text-xs md:text-sm mt-1 line-clamp-2 leading-relaxed">{toast.message}</p>
                    </div>
                    <button 
                      onClick={() => setToast(null)}
                      className="w-8 h-8 flex items-center justify-center rounded-full bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700 transition-colors shrink-0 border border-slate-600/50"
                    >
                      <i className="fa-solid fa-xmark"></i>
                    </button>
                  </div>
                </div>
              )}

              {/* Premium Summary Modal */}
              {isSummaryOpen && (
                <div className="fixed inset-0 z-[60] flex items-end md:items-center justify-center bg-slate-900/60 backdrop-blur-md transition-opacity duration-300">
                  <div className="bg-slate-50 w-full max-w-2xl h-[92vh] md:h-[85vh] rounded-t-3xl md:rounded-3xl shadow-[0_20px_60px_rgba(0,0,0,0.4)] flex flex-col overflow-hidden border border-white/20 transform transition-transform">
                    
                    {/* Modal Header */}
                    <div className="bg-white/90 backdrop-blur-xl border-b border-slate-200/80 px-5 py-4 flex items-center justify-between sticky top-0 z-10 shadow-sm">
                      <div className="flex items-center gap-4">
                        <div className="bg-gradient-to-br from-indigo-500 to-purple-600 w-10 h-10 flex items-center justify-center rounded-2xl text-white shadow-[0_4px_10px_rgba(99,102,241,0.4)] border border-indigo-400">
                          <i className="fa-solid fa-clipboard-list drop-shadow-md"></i>
                        </div>
                        <div>
                          <h3 className="font-black text-slate-800 text-lg">สรุปรายงานสถานะ WSP</h3>
                          <p className="text-xs text-indigo-600 font-bold">แยกตามรายการที่ทำแล้วและยังไม่ทำ</p>
                        </div>
                      </div>
                      <button 
                        onClick={() => setIsSummaryOpen(false)}
                        className="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-slate-800 transition-colors shadow-inner"
                      >
                        <i className="fa-solid fa-xmark text-lg"></i>
                      </button>
                    </div>

                    {/* Modal Content */}
                    <div className="flex-1 overflow-y-auto p-4 md:p-6 space-y-6">
                      
                      {/* Score & Progress Cards */}
                      <div className="grid grid-cols-2 gap-4">
                        <div className="relative bg-white p-5 rounded-3xl border border-slate-200 shadow-[0_8px_20px_rgba(0,0,0,0.03)] flex flex-col justify-center items-center text-center overflow-hidden">
                          <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none text-6xl">
                            <i className="fa-solid fa-bullseye"></i>
                          </div>
                          <div className="bg-indigo-50 w-12 h-12 flex items-center justify-center rounded-2xl mb-3 text-indigo-600">
                            <i className="fa-solid fa-bullseye text-xl"></i>
                          </div>
                          <p className="text-xs text-slate-500 font-bold mb-1">คะแนนคาดการณ์</p>
                          <p className="text-4xl font-black text-slate-800 tracking-tight">{estimatedScore} <span className="text-base font-bold text-slate-400">/ 70</span></p>
                        </div>
                        <div className="relative bg-white p-5 rounded-3xl border border-slate-200 shadow-[0_8px_20px_rgba(0,0,0,0.03)] flex flex-col justify-center items-center text-center overflow-hidden">
                          <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none text-6xl">
                            <i className="fa-solid fa-arrow-trend-up"></i>
                          </div>
                          <div className="bg-emerald-50 w-12 h-12 flex items-center justify-center rounded-2xl mb-3 text-emerald-600">
                            <i className="fa-solid fa-arrow-trend-up text-xl"></i>
                          </div>
                          <p className="text-xs text-slate-500 font-bold mb-1">ความก้าวหน้าปัจจุบัน</p>
                          <p className="text-4xl font-black text-emerald-600 tracking-tight">{overallProgress}%</p>
                        </div>
                      </div>

                      {/* Pending Tasks Section */}
                      <div>
                        <div className="flex items-center gap-3 mb-4 px-1">
                          <div className="w-2.5 h-7 bg-gradient-to-b from-orange-400 to-red-500 rounded-full shadow-[0_0_10px_rgba(249,115,22,0.5)]"></div>
                          <h4 className="font-black text-slate-800 text-lg">งานที่ยังไม่ดำเนินการ <span className="text-orange-600 bg-orange-100 px-2 py-0.5 rounded-lg text-sm ml-1">{allPendingTasks.length}</span></h4>
                        </div>
                        <div className="space-y-3">
                          {allPendingTasks.length === 0 ? (
                            <div className="bg-white p-8 rounded-3xl border border-slate-200 text-center flex flex-col items-center justify-center">
                              <div className="bg-emerald-100 w-16 h-16 flex items-center justify-center rounded-full text-emerald-500 mb-3">
                                <i className="fa-solid fa-wand-magic-sparkles text-2xl"></i>
                              </div>
                              <p className="text-slate-800 font-bold text-lg">ไม่มีงานค้าง</p>
                              <p className="text-slate-500 text-sm">ยอดเยี่ยมมาก! ดำเนินการครบทุกหัวข้อแล้ว</p>
                            </div>
                          ) : (
                            allPendingTasks.map(task => (
                              <div key={task.id} className="bg-white p-4 md:p-5 rounded-2xl border border-slate-200 shadow-[0_4px_15px_rgba(0,0,0,0.03)] flex items-start gap-3.5 group hover:border-indigo-300 transition-all">
                                <i className="fa-regular fa-circle text-slate-300 mt-1 text-xl shrink-0"></i>
                                <div className="flex-1 min-w-0">
                                  <p className="text-xs font-bold text-indigo-500 mb-1.5 truncate">{task.catTitle}</p>
                                  <p className="text-sm md:text-base font-bold text-slate-700 leading-snug">{task.id} {task.text}</p>
                                  {task.remark && (
                                    <p className="text-xs md:text-sm text-orange-800 mt-3 bg-gradient-to-r from-orange-50 to-amber-50 p-3 rounded-xl border border-orange-200/60 flex items-start gap-2 shadow-sm">
                                      <i className="fa-solid fa-triangle-exclamation text-orange-500 mt-0.5 shrink-0"></i> <span className="font-medium">{task.remark}</span>
                                    </p>
                                  )}
                                </div>
                                <button 
                                  onClick={() => handleCopy(`[ยังไม่ดำเนินการ] ${task.catTitle}\nงาน: ${task.id} ${task.text}\n${task.remark ? 'ปัญหา/หมายเหตุ: ' + task.remark : ''}`)}
                                  className="shrink-0 w-10 h-10 flex items-center justify-center text-slate-400 hover:text-white hover:bg-indigo-500 rounded-xl transition-all shadow-sm border border-slate-100 active:scale-95"
                                  title="คัดลอกข้อความ"
                                >
                                  <i className="fa-solid fa-copy"></i>
                                </button>
                              </div>
                            ))
                          )}
                        </div>
                      </div>

                      {/* Completed Tasks Section */}
                      <div>
                        <div className="flex items-center gap-3 mb-4 px-1 mt-8">
                          <div className="w-2.5 h-7 bg-gradient-to-b from-emerald-400 to-green-500 rounded-full shadow-[0_0_10px_rgba(16,185,129,0.5)]"></div>
                          <h4 className="font-black text-slate-800 text-lg">งานที่ดำเนินการแล้ว <span className="text-emerald-600 bg-emerald-100 px-2 py-0.5 rounded-lg text-sm ml-1">{allCompletedTasks.length}</span></h4>
                        </div>
                        <div className="space-y-3">
                          {allCompletedTasks.length === 0 ? (
                            <div className="bg-white p-6 rounded-3xl border border-slate-200 text-center text-slate-500 font-medium">ยังไม่มีงานที่ดำเนินการเสร็จ</div>
                          ) : (
                            allCompletedTasks.map(task => (
                              <div key={task.id} className="bg-gradient-to-r from-emerald-50/50 to-white p-4 md:p-5 rounded-2xl border border-emerald-100 flex items-start gap-3.5 shadow-sm">
                                <i className="fa-solid fa-circle-check text-emerald-500 mt-0.5 text-xl drop-shadow-sm shrink-0"></i>
                                <div className="flex-1 min-w-0">
                                  <p className="text-xs font-bold text-emerald-600 mb-1.5 truncate">{task.catTitle}</p>
                                  <p className="text-sm md:text-base font-bold text-slate-700 leading-snug">{task.id} {task.text}</p>
                                </div>
                                <button 
                                  onClick={() => handleCopy(`[ดำเนินการแล้ว]\nงาน: ${task.id} ${task.text}`)}
                                  className="shrink-0 w-10 h-10 flex items-center justify-center text-emerald-400 hover:text-white hover:bg-emerald-500 rounded-xl transition-all shadow-sm border border-emerald-50 active:scale-95"
                                  title="คัดลอกข้อความ"
                                >
                                  <i className="fa-solid fa-copy"></i>
                                </button>
                              </div>
                            ))
                          )}
                        </div>
                      </div>

                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        }

        // สั่งให้ React ทำงานและเรนเดอร์ลงใน <div id="root">
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
