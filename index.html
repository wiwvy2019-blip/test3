var INITIAL_DATA = [
  { id:1, title:"1. การจัดตั้งทีมงาน (Assemble the WSP team)", tasks:[

    {id:"1.2",text:"รายชื่อผู้มีส่วนได้ส่วนเสียสอดคล้องตามความเสี่ยง",completed:true,remark:""},
    {id:"1.3",text:"สมาชิกหรือรายชื่อผู้ติดต่อมีความเชี่ยวชาญกับความเสี่ยง",completed:false,remark:""},
    {id:"1.4",text:"ทีมงานประชุมตามแผนที่กำหนดและหลังจากเกิดเหตุ",completed:false,remark:""},
    {id:"1.5",text:"มีการรายงานผลการประชุม WSP ให้พนักงานทราบ",completed:false,remark:""},
    {id:"1.6",text:"บันทึกการประชุม ความก้าวหน้าในการดำเนินงาน",completed:false,remark:""},

    {id:"2.2",text:"Process Flow diagram ครบถ้วน เป็นปัจจุบัน ตั้งแต่แหล่งน้ำถึงผู้ใช้น้ำ",completed:false,remark:""},
    {id:"2.3",text:"การอธิบายอุบัติการณ์หรือความเสี่ยง",completed:false,remark:""},
    {id:"2.4",text:"การสำรวจความพร้อมใช้งานของระบบประปา",completed:false,remark:""},

    {id:"3.1",text:"ระบุอันตรายและเหตุการณ์อันตรายได้ครบถ้วนทั้ง 3 ระบบ",completed:false,remark:""},

    {id:"3.5",text:"จัดลำดับความสำคัญของความเสี่ยงที่มีนัยสำคัญ",completed:false,remark:""},
  ], remark:""},
  { id:4, title:"4. แผนปรับปรุงพัฒนา (Improvement/upgrade plan)", tasks:[
    {id:"4.1",text:"จัดทำแผนปรับปรุงสำหรับความเสี่ยงที่สำคัญที่ควบคุมไม่ได้",completed:false,remark:""},
    {id:"4.2",text:"แผนปรับปรุงมีความชัดเจนสอดคล้องกับผลประเมิน",completed:false,remark:""},
    {id:"4.3",text:"การดำเนินงานตามแผนปรับปรุง",completed:false,remark:""},

    {id:"5.1",text:"จัดทำแผนติดตามการปฏิบัติงานครอบคลุมมาตรการแก้ไข",completed:false,remark:""},
    {id:"5.2",text:"บันทึกติดตามให้เห็นว่าการปฏิบัติงานเป็นไปตามแผน",completed:false,remark:""},

    {id:"6.2",text:"ดำเนินการสอบทาน",completed:false,remark:""},
    {id:"6.3",text:"แผนการจัดการในภาวะฉุกเฉิน (Emergency response plan)",completed:false,remark:""},
    {id:"6.4",text:"ปรับปรุงพื้นที่ระบบประปาให้สะอาดเรียบร้อย ปลอดภัย (5ส)",completed:false,remark:""},
    {id:"6.5",text:"พนักงานได้รับการฝึกอบรม/พัฒนาทักษะด้านระบบประปา",completed:false,remark:""},
  ], remark:""},
  { id:7, title:"7. การทบทวนและปรับปรุง WSP (Review of the WSP)", tasks:[
    {id:"7.1",text:"กำหนดตารางเวลาการทบทวนและแก้ไข WSP เป็นประจำ",completed:false,remark:""},
    {id:"7.2",text:"ทบทวนและแก้ไข WSP ตามที่กำหนดไว้",completed:false,remark:""},
  ], remark:""},
];

var MAX_SCORE = 70;
var STORAGE_KEY = 'wsp_lahansai_v3';

// ── SVG helper ────────────────────────────────────────────────────────────────
function svg(size, children, extra) {
  return h('svg', Object.assign({
    width:size, height:size, viewBox:"0 0 24 24", fill:"none",
    stroke:"currentColor", strokeWidth:2,
    strokeLinecap:"round", strokeLinejoin:"round",
    style:{flexShrink:0, display:'block'}
  }, extra||{}), children);
}
function path(d, extra) { return h('path', Object.assign({d:d}, extra||{})); }
function circle(cx,cy,r){ return h('circle',{cx:cx,cy:cy,r:r}); }

var ICONS = {
  droplet: function(s){ return svg(s||22, path("M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z")); },
  users:   function(s){ return svg(s||18, path("M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z")); },
  alert:   function(s){ return svg(s||18, [path("M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z",{key:'p'}), path("M12 9v4",{key:'l'}), path("M12 17h.01",{key:'d'})]); },
  bar:     function(s){ return svg(s||18, [path("M18 20V10",{key:'a'}),path("M12 20V4",{key:'b'}),path("M6 20v-6",{key:'c'})]); },
  activity:function(s){ return svg(s||18, path("M22 12h-4l-3 9L9 3l-3 9H2")); },
  file:    function(s){ return svg(s||18, [path("M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z",{key:'a'}),path("M14 2v6h6",{key:'b'}),path("M16 13H8",{key:'c'}),path("M16 17H8",{key:'d'}),path("M10 9H8",{key:'e'})]); },
  refresh: function(s){ return svg(s||18, [path("M23 4v6h-6",{key:'a'}),path("M1 20v-6h6",{key:'b'}),path("M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15",{key:'c'})]); },
  check:   function(s){ return svg(s||15, path("M20 6L9 17l-5-5",{strokeWidth:3})); },
  checkCi: function(s){ return svg(s||20, [path("M22 11.08V12a10 10 0 1 1-5.93-9.14",{key:'a'}),path("M22 4L12 14.01l-3-3",{key:'b'})]); },
  circ:    function(s){ return svg(s||20, circle(12,12,10)); },
  bell:    function(s){ return svg(s||13, [path("M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9",{key:'a'}),path("M13.73 21a2 2 0 0 1-3.46 0",{key:'b'})]); },
  down:    function(s){ return svg(s||18, path("M6 9l6 6 6-6")); },
  up:      function(s){ return svg(s||18, path("M18 15l-6-6-6 6")); },
  x:       function(s){ return svg(s||18, [path("M18 6L6 18",{key:'a'}),path("M6 6l12 12",{key:'b'})]); },
  copy:    function(s){ return svg(s||15, [path("M20 9h-9a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2z",{key:'a'}),path("M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1",{key:'b'})]); },
  clip:    function(s){ return svg(s||18, [path("M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2",{key:'a'}),path("M9 2h6a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z",{key:'b'})]); },
  trend:   function(s){ return svg(s||22, [path("M23 6l-9.5 9.5-5-5L1 18",{key:'a'}),path("M17 6h6v6",{key:'b'})]); },
  target:  function(s){ return svg(s||22, [path("M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z",{key:'a'}),path("M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12z",{key:'b'}),path("M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z",{key:'c'})]); },
  sparkle: function(s){ return svg(s||14, [path("M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z",{key:'a'}),path("M5 17l.8 2.2L8 20l-2.2.8L5 23l-.8-2.2L2 20l2.2-.8L5 17z",{key:'b'}),path("M19 2l.6 1.6 1.6.6-1.6.6L19 6.5l-.6-1.7L16.8 4.2l1.6-.6L19 2z",{key:'c'})]); },
  save:    function(s){ return svg(s||14, [path("M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z",{key:'a'}),path("M17 21v-8H7v8",{key:'b'}),path("M7 3v5h8",{key:'c'})]); },
};

var CAT_ICONS = ['users','users','alert','bar','activity','file','refresh'];

// ── Storage ───────────────────────────────────────────────────────────────────
function loadState() {
  try { var r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}
function saveState(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}
function mergeWithInitial(saved) {
  return INITIAL_DATA.map(function(cat) {
    var sc = saved.find(function(s){ return s.id === cat.id; });
    if (!sc) return Object.assign({}, cat, {remark:''});
    return Object.assign({}, cat, {
      remark: sc.remark || '',
      tasks: cat.tasks.map(function(task) {
        var st = sc.tasks.find(function(t){ return t.id === task.id; });
        return st ? Object.assign({}, task, {completed: st.completed, remark: st.remark||''}) : Object.assign({}, task, {remark:''});
      })
    });
  });
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  var saved = loadState();
  var initCats = saved ? mergeWithInitial(saved) : INITIAL_DATA.map(function(c){ return Object.assign({},c,{remark:''}); });

  var catsState = useState(initCats);
  var cats = catsState[0]; var setCats = catsState[1];

  var expandedState = useState([1]);
  var expanded = expandedState[0]; var setExpanded = expandedState[1];

  var toastState = useState(null);
  var toast = toastState[0]; var setToast = toastState[1];

  var modalState = useState(false);
  var modal = modalState[0]; var setModal = modalState[1];

  var saveAnimState = useState(false);
  var saveAnim = saveAnimState[0]; var setSaveAnim = saveAnimState[1];

  var toastRef = useRef(null);

  useEffect(function() {
    saveState(cats);
    setSaveAnim(true);
    var t = setTimeout(function(){ setSaveAnim(false); }, 1400);
    return function(){ clearTimeout(t); };
  }, [cats]);

  var total = cats.reduce(function(s,c){ return s + c.tasks.length; }, 0);
  var done  = cats.reduce(function(s,c){ return s + c.tasks.filter(function(t){ return t.completed; }).length; }, 0);
  var pct   = Math.round((done/total)*100) || 0;
  var score = ((done/total)*MAX_SCORE).toFixed(1);

  function showToast(title, msg) {
    if (toastRef.current) clearTimeout(toastRef.current);
    setToast({title:title, msg:msg});
    toastRef.current = setTimeout(function(){ setToast(null); }, 3200);
  }

  function toggleCat(id) {
    setExpanded(function(p){ return p.includes(id) ? p.filter(function(i){ return i!==id; }) : p.concat([id]); });
  }

  function toggleTask(catId, taskId) {
    setCats(function(prev) {
      return prev.map(function(c) {
        if (c.id !== catId) return c;
        return Object.assign({}, c, {
          tasks: c.tasks.map(function(t) {
            if (t.id !== taskId) return t;
            var next = !t.completed;
            if (next) {
              var short = t.text.length > 45 ? t.text.slice(0,45)+'…' : t.text;
              setTimeout(function(){ showToast('✅ บันทึกแล้ว', '"'+short+'" เสร็จแล้ว'); }, 30);
            }
            return Object.assign({}, t, {completed: next});
          })
        });
      });
    });
  }

  function setCatRemark(id, v) {
    setCats(function(p){ return p.map(function(c){ return c.id===id ? Object.assign({},c,{remark:v}) : c; }); });
  }

  function setTaskRemark(cid, tid, v) {
    setCats(function(p){ return p.map(function(c){
      if (c.id !== cid) return c;
      return Object.assign({}, c, {tasks: c.tasks.map(function(t){ return t.id===tid ? Object.assign({},t,{remark:v}) : t; })});
    }); });
  }

  function doCopy(txt) {
    var ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showToast('📋 คัดลอกแล้ว','ข้อความถูกคัดลอกลงคลิปบอร์ดแล้ว'); } catch(e) {}
    document.body.removeChild(ta);
  }

  var pending   = cats.reduce(function(a,c){ return a.concat(c.tasks.filter(function(t){ return !t.completed; }).map(function(t){ return Object.assign({},t,{catTitle:c.title}); })); }, []);
  var completed = cats.reduce(function(a,c){ return a.concat(c.tasks.filter(function(t){ return t.completed; }).map(function(t){ return Object.assign({},t,{catTitle:c.title}); })); }, []);

  // ── Render ─────────────────────────────────────────────────────────────────
  return h('div', {style:{minHeight:'100vh',background:'#f1f5f9',paddingBottom:80}},

    // HEADER
    h('header', {style:{position:'sticky',top:0,zIndex:30,background:'rgba(255,255,255,0.88)',backdropFilter:'blur(20px)',borderBottom:'1px solid rgba(226,232,240,0.8)',boxShadow:'0 4px 24px rgba(0,0,0,0.05)'}},
      h('div', {style:{maxWidth:720,margin:'0 auto',padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
        h('div', {style:{display:'flex',alignItems:'center',gap:12}},
          h('div', {style:{position:'relative'}},
            h('div', {style:{position:'absolute',inset:-2,borderRadius:14,background:'rgba(56,189,248,0.4)',filter:'blur(8px)'}}),
            h('div', {style:{position:'relative',background:'linear-gradient(135deg,#38bdf8,#3b82f6,#6366f1)',padding:'8px 10px',borderRadius:14,color:'white',border:'1px solid rgba(96,165,250,0.5)',boxShadow:'inset 0 2px 4px rgba(255,255,255,0.4),0 4px 12px rgba(59,130,246,0.5)'}},
              ICONS.droplet(22)
            )
          ),
          h('div', null,
            h('h1', {style:{fontSize:20,fontWeight:900,letterSpacing:'-0.5px',background:'linear-gradient(135deg,#312e81,#3b82f6)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}, 'WSP ละหานทราย'),
            h('p',  {style:{fontSize:12,color:'#64748b',fontWeight:600}}, 'โครงการจัดการน้ำสะอาด กปภ.สาขาละหานทราย')
          )
        ),
        h('div', {style:{display:'flex',alignItems:'center',gap:6,fontSize:12,fontWeight:700,padding:'6px 12px',borderRadius:10,background:saveAnim?'#f0fdf4':'#f8fafc',border:'1px solid '+(saveAnim?'#86efac':'#e2e8f0'),color:saveAnim?'#16a34a':'#94a3b8',transition:'all .3s'}},
          h('span', {className: saveAnim?'save-pulse':'', style:{display:'flex'}}, ICONS.save(14)),
          saveAnim ? 'บันทึกแล้ว' : 'อัตโนมัติ'
        )
      )
    ),

    h('main', {style:{maxWidth:720,margin:'0 auto',padding:'24px 16px 0'}},

      // DASHBOARD
      h('section', {style:{position:'relative',background:'linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%)',borderRadius:28,padding:'24px 28px',marginBottom:28,boxShadow:'0 20px 50px -10px rgba(49,46,129,0.7)',overflow:'hidden',border:'1px solid rgba(99,102,241,0.3)'}},
        h('div', {style:{position:'absolute',top:-30,right:-30,width:180,height:180,borderRadius:'50%',background:'rgba(99,102,241,0.35)',filter:'blur(50px)',pointerEvents:'none'}}),
        h('div', {style:{position:'absolute',bottom:-30,left:-30,width:140,height:140,borderRadius:'50%',background:'rgba(6,182,212,0.25)',filter:'blur(40px)',pointerEvents:'none'}}),
        h('div', {style:{position:'relative',zIndex:1}},
          h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:16}},
            h('div', null,
              h('p', {style:{color:'#a5b4fc',fontSize:13,fontWeight:600,marginBottom:6,display:'flex',alignItems:'center',gap:6}}, [ICONS.sparkle(14), ' ความก้าวหน้าโครงการ']),
              h('span', {style:{fontSize:60,fontWeight:900,color:'white',letterSpacing:'-3px',lineHeight:1,textShadow:'0 2px 20px rgba(255,255,255,0.2)'}}, pct+'%')
            ),
            h('div', {style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:10}},
              h('span', {style:{background:'rgba(255,255,255,0.1)',backdropFilter:'blur(10px)',color:'#e0e7ff',fontSize:12,fontWeight:700,padding:'6px 14px',borderRadius:10,border:'1px solid rgba(255,255,255,0.1)'}}, done+' / '+total+' งาน'),
              h('button', {
                onClick: function(){ setModal(true); },
                style:{display:'flex',alignItems:'center',gap:7,background:'linear-gradient(to bottom,#818cf8,#6366f1)',color:'white',fontSize:13,fontWeight:700,padding:'9px 18px',borderRadius:12,border:'none',cursor:'pointer',boxShadow:'0 5px 0 #4338ca,0 10px 20px rgba(99,102,241,0.4)',transition:'all .12s',outline:'none'},
                onMouseDown: function(e){e.currentTarget.style.boxShadow='0 0 0 #4338ca';e.currentTarget.style.transform='translateY(5px)';},
                onMouseUp:   function(e){e.currentTarget.style.boxShadow='0 5px 0 #4338ca,0 10px 20px rgba(99,102,241,0.4)';e.currentTarget.style.transform='translateY(0)';},
                onMouseLeave:function(e){e.currentTarget.style.boxShadow='0 5px 0 #4338ca,0 10px 20px rgba(99,102,241,0.4)';e.currentTarget.style.transform='translateY(0)';}
              }, [ICONS.clip(16), ' ดูสรุปรายงาน'])
            )
          ),

                    h('div', {style:{width:130,height:7,borderRadius:99,background:'rgba(148,163,184,0.2)',overflow:'hidden',boxShadow:'inset 0 1px 2px rgba(0,0,0,0.08)'}},
                      h('div', {style:{height:'100%',borderRadius:99,background:allDone?'linear-gradient(to right,#34d399,#10b981)':'linear-gradient(to right,#22d3ee,#6366f1)',width:catPct+'%',transition:'width .7s cubic-bezier(.22,1,.36,1)',position:'relative'}},

                        h('button', {style:{flexShrink:0,width:30,height:30,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:task.completed?'linear-gradient(135deg,#34d399,#10b981)':'linear-gradient(135deg,#f8fafc,#e2e8f0)',border:task.completed?'1px solid #6ee7b7':'1px solid #cbd5e1',boxShadow:task.completed?'inset 0 2px 4px rgba(255,255,255,0.5),0 0 15px rgba(16,185,129,0.4)':'inset 0 2px 5px rgba(0,0,0,0.08)',color:task.completed?'white':'transparent',cursor:'pointer',outline:'none',transition:'all .3s'}},
                          ICONS.check(15)

                        h('div', {style:{flex:1}},
                          h('p', {style:{fontSize:14,lineHeight:1.6,color:task.completed?'#94a3b8':'#1e293b',fontWeight:task.completed?500:700,textDecoration:task.completed?'line-through':'none',transition:'all .2s'}},

            )

        })
      )

    toast && h('div', {style:{position:'fixed',bottom:24,left:0,right:0,zIndex:70,display:'flex',justifyContent:'center',padding:'0 16px',pointerEvents:'none'}, className:'slide-up'},

        h('button', {onClick:function(){ setToast(null); }, style:{width:30,height:30,borderRadius:'50%',background:'rgba(30,41,59,0.8)',border:'1px solid rgba(100,116,139,0.4)',color:'#94a3b8',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,outline:'none'}},

      h('div', {className:'slide-up', style:{background:'#f8fafc',width:'100%',maxWidth:700,height:'88vh',borderRadius:'24px 24px 0 0',boxShadow:'0 -20px 60px rgba(0,0,0,0.4)',display:'flex',flexDirection:'column',overflow:'hidden',border:'1px solid rgba(255,255,255,0.2)'}},
        // modal header
        h('div', {style:{background:'rgba(255,255,255,0.95)',backdropFilter:'blur(20px)',borderBottom:'1px solid #e2e8f0',padding:'16px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}},
          h('div', {style:{display:'flex',alignItems:'center',gap:14}},
            h('div', {style:{background:'linear-gradient(135deg,#6366f1,#8b5cf6)',color:'white',padding:'9px 11px',borderRadius:16,boxShadow:'0 4px 10px rgba(99,102,241,0.4)',border:'1px solid #818cf8'}}, ICONS.clip(18)),
            h('div', null,
              h('h3', {style:{fontWeight:900,color:'#1e293b',fontSize:17}}, 'สรุปรายงานสถานะ WSP'),

          h('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:24}},

            h('div', {style:{background:'white',padding:'20px 16px',borderRadius:24,border:'1px solid #e2e8f0',boxShadow:'0 4px 16px rgba(0,0,0,0.03)',display:'flex',flexDirection:'column',alignItems:'center',textAlign:'center'}},
              h('div', {style:{background:'#f0fdf4',padding:'10px 12px',borderRadius:16,color:'#16a34a',marginBottom:10}}, ICONS.trend(22)),
              h('p', {style:{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:4}}, 'ความก้าวหน้า'),
              h('p', {style:{fontSize:26,fontWeight:900,color:'#16a34a',letterSpacing:'-1px'}}, pct+'%')
            )
          ),

          // pending list
          h('div', {style:{marginBottom:24}},
            h('div', {style:{display:'flex',alignItems:'center',gap:10,marginBottom:14,paddingLeft:4}},
              h('div', {style:{width:10,height:28,background:'linear-gradient(to bottom,#fb923c,#ef4444)',borderRadius:99,boxShadow:'0 0 10px rgba(249,115,22,0.5)'}}),
              h('h4', {style:{fontWeight:900,fontSize:16,color:'#1e293b'}},
                ['งานที่ยังไม่ดำเนินการ ', h('span', {key:'c', style:{color:'#ea580c',background:'#fff7ed',padding:'2px 10px',borderRadius:8,fontSize:13,marginLeft:4,fontWeight:800}}, pending.length)]
              )

            h('div', {style:{display:'flex',flexDirection:'column',gap:10}},
              pending.length === 0
                ? h('div', {style:{background:'white',padding:'28px 20px',borderRadius:24,border:'1px solid #e2e8f0',textAlign:'center'}},
                    h('p', {style:{fontWeight:800,color:'#1e293b',fontSize:16}}, 'ไม่มีงานค้าง 🎉'),
                    h('p', {style:{color:'#64748b',fontSize:13,marginTop:4}}, 'ดำเนินการครบทุกหัวข้อแล้ว')

                      h('div', {style:{color:'#cbd5e1',marginTop:2,display:'flex'}}, ICONS.circ(20)),
                      h('div', {style:{flex:1,minWidth:0}},
                        h('p', {style:{fontSize:11,fontWeight:700,color:'#6366f1',marginBottom:5,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}, t.catTitle),
                        h('p', {style:{fontSize:13,fontWeight:700,color:'#334155',lineHeight:1.5}}, t.id+' '+t.text),

                      h('button', {

              )
            ),
            h('div', {style:{display:'flex',flexDirection:'column',gap:10}},
              completed.length === 0
                ? h('div', {style:{background:'white',padding:'20px',borderRadius:20,border:'1px solid #e2e8f0',textAlign:'center',color:'#94a3b8',fontWeight:600,fontSize:14}}, 'ยังไม่มีงานที่ดำเนินการเสร็จ')

                        onMouseLeave:function(e){e.currentTarget.style.background='white';e.currentTarget.style.color='#6ee7b7';}
                      }, ICONS.copy(15))

}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
