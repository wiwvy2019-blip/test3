<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WSP ละหานทราย – ติดตามความก้าวหน้า</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --indigo:#4f46e5;--indigo-light:#eef2ff;--indigo-mid:#818cf8;
  --green:#059669;--green-light:#ecfdf5;
  --amber:#d97706;--amber-light:#fffbeb;
  --red:#dc2626;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:0 20px 40px rgba(0,0,0,.1),0 8px 16px rgba(0,0,0,.06);
  --radius:20px;--radius-sm:12px;
}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
button,input,textarea,select{font-family:'Sarabun',sans-serif}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes toastIn{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .35s ease forwards}
.spin-anim{animation:spin .9s linear infinite}
.container{max-width:740px;margin:0 auto;padding:0 16px}

#loading-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.loading-text{font-size:13px;font-weight:700;color:var(--text3)}

.header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm)}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;max-width:740px;margin:0 auto;gap:12px}
.logo-wrap{display:flex;align-items:center;gap:11px}
.logo-icon{background:linear-gradient(135deg,#0ea5e9,#4f46e5);padding:9px 11px;border-radius:14px;color:white;box-shadow:0 4px 12px rgba(79,70,229,.35);display:flex}
.site-title{font-size:18px;font-weight:900;color:var(--text);letter-spacing:-.4px}
.site-sub{font-size:11px;color:var(--text3);font-weight:600;margin-top:1px}
.save-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:6px 12px;border-radius:99px;transition:all .3s;white-space:nowrap;border:1px solid var(--border);background:var(--bg);color:var(--text3)}
.save-badge.saved{background:var(--green-light);color:var(--green);border-color:#a7f3d0}
.save-badge.saving{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}

.dashboard{background:linear-gradient(140deg,#0f172a 0%,#1e1b4b 45%,#0c1445 100%);border-radius:var(--radius);padding:26px 28px;margin:20px 0 24px;position:relative;overflow:hidden;box-shadow:0 24px 48px -12px rgba(49,46,129,.55);border:1px solid rgba(99,102,241,.25)}
.db-glow1{position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(99,102,241,.35);filter:blur(60px);pointer-events:none}
.db-glow2{position:absolute;bottom:-30px;left:-30px;width:150px;height:150px;border-radius:50%;background:rgba(6,182,212,.2);filter:blur(45px);pointer-events:none}
.db-content{position:relative;z-index:1}
.db-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px;gap:16px;flex-wrap:wrap}
.db-pct{font-size:62px;font-weight:900;color:white;line-height:1;letter-spacing:-3px;font-family:'IBM Plex Mono',monospace}
.db-label{color:#a5b4fc;font-size:12px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.db-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.db-count{background:rgba(255,255,255,.1);color:#e0e7ff;font-size:12px;font-weight:700;padding:7px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.12)}
.btn-report{display:flex;align-items:center;gap:7px;background:linear-gradient(135deg,#818cf8,#4f46e5);color:white;font-size:13px;font-weight:700;padding:10px 18px;border-radius:12px;border:none;cursor:pointer;box-shadow:0 6px 0 #3730a3,0 10px 20px rgba(79,70,229,.4);transition:all .12s;outline:none}
.btn-report:active{box-shadow:0 0 0 #3730a3;transform:translateY(6px)}
.progress-track{width:100%;height:13px;border-radius:99px;background:rgba(15,23,42,.65);border:1px solid rgba(255,255,255,.08);overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#22d3ee,#3b82f6,#8b5cf6);box-shadow:0 0 18px rgba(56,189,248,.6);transition:width .9s cubic-bezier(.22,1,.36,1);position:relative}
.progress-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,.35);border-radius:99px}
.db-score{margin-top:14px;display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.07);border-radius:10px;padding:7px 16px;border:1px solid rgba(255,255,255,.1);color:white;font-size:13px;font-weight:700}
.score-num{color:#818cf8;font-size:17px;font-weight:900;font-family:'IBM Plex Mono',monospace}

/* EMPLOYEE BANNER */
.emp-banner{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.emp-top-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.emp-avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center;color:white;font-size:19px;font-weight:900;flex-shrink:0;box-shadow:0 4px 12px rgba(79,70,229,.3)}
.emp-fields{flex:1;min-width:200px}
.emp-label{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:4px}
.emp-row{display:flex;gap:10px;flex-wrap:wrap}
.emp-input{flex:1;min-width:140px;padding:9px 14px;font-size:13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);outline:none;transition:all .2s;font-weight:600}
.emp-input:focus{border-color:var(--indigo);background:white;box-shadow:0 0 0 3px rgba(79,70,229,.12)}
.btn-confirm{padding:9px 16px;background:var(--indigo);color:white;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;outline:none;transition:all .2s}
.btn-confirm:hover{background:#3730a3}

/* TEAM BAR */
.team-bar{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.team-bar-label{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.5px}
.team-avatars{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.team-chip{display:inline-flex;align-items:center;gap:7px;padding:5px 12px 5px 5px;border-radius:99px;background:var(--bg);border:1.5px solid var(--border);font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .2s}
.team-chip:hover{border-color:var(--indigo);background:var(--indigo-light);color:var(--indigo)}
.team-chip.me{border-color:var(--indigo);background:var(--indigo-light);color:var(--indigo)}
.team-chip-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:800;flex-shrink:0}
.team-chip-time{font-size:10px;color:var(--text3);font-weight:500}
.btn-team{display:flex;align-items:center;gap:6px;padding:6px 13px;font-size:12px;font-weight:700;background:var(--indigo-light);color:var(--indigo);border:1.5px solid #c7d2fe;border-radius:99px;cursor:pointer;outline:none;transition:all .2s}
.btn-team:hover{background:var(--indigo);color:white;border-color:var(--indigo)}

/* TEAM MODAL */
.overlay{position:fixed;inset:0;z-index:80;background:rgba(15,23,42,.65);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeUp .2s ease forwards}
.team-modal{background:white;border-radius:24px;width:100%;max-width:460px;box-shadow:var(--shadow-lg);overflow:hidden;border:1px solid var(--border)}
.modal-hdr{background:rgba(255,255,255,.97);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-body-scroll{padding:18px 20px;max-height:65vh;overflow-y:auto}
.member-card{display:flex;align-items:flex-start;gap:12px;padding:14px;border-radius:16px;border:1px solid var(--border);margin-bottom:10px;transition:all .2s}
.member-card:hover{border-color:#c7d2fe;background:var(--indigo-light)}
.member-av-lg{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:17px;font-weight:900;flex-shrink:0;box-shadow:var(--shadow-sm)}
.member-task-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--green-light);color:var(--green);border:1px solid #a7f3d0}

/* CAT CARD */
.cat-card{background:white;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow:hidden;transition:all .3s;margin-bottom:14px}
.cat-card.expanded{border-color:#c7d2fe;box-shadow:0 10px 28px -8px rgba(79,70,229,.15)}
.cat-card.done{border-color:#a7f3d0;background:linear-gradient(to right,#f0fdf4,white);box-shadow:0 8px 24px -8px rgba(16,185,129,.18)}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;cursor:pointer;user-select:none;transition:background .2s}
.cat-header:hover{background:rgba(248,250,252,.8)}
.cat-icon-wrap{padding:10px 12px;border-radius:14px;display:flex;align-items:center;transition:all .3s;flex-shrink:0}
.cat-info{flex:1;padding:0 14px 0 2px}
.cat-title{font-weight:700;font-size:13.5px;line-height:1.4;margin-bottom:7px}
.cat-progress-row{display:flex;align-items:center;gap:9px}
.mini-track{width:120px;height:6px;border-radius:99px;background:rgba(148,163,184,.18);overflow:hidden;flex-shrink:0}
.mini-fill{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.22,1,.36,1)}
.cat-count{font-size:11px;font-weight:700;color:var(--text2);background:var(--bg);padding:2px 8px;border-radius:6px}
.cat-pct{font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px}
.chevron{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0}
.accordion-body{overflow:hidden;transition:max-height .45s cubic-bezier(.22,1,.36,1),opacity .3s ease}
.cat-remark-box{margin:0 16px 14px;padding:14px;background:linear-gradient(to right,#fffbeb,rgba(255,251,235,.4));border:1px solid rgba(253,186,116,.5);border-radius:14px}
.remark-label{font-size:12px;font-weight:700;color:#92400e;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.remark-textarea{width:100%;padding:9px 13px;font-size:13px;border:1px solid #fed7aa;border-radius:10px;background:white;outline:none;resize:none;color:var(--text);transition:all .2s;line-height:1.6}
.remark-textarea:focus{border-color:#fb923c;box-shadow:0 0 0 3px rgba(251,146,60,.15)}

/* TASK */
.task-list{display:flex;flex-direction:column;gap:9px;padding:0 16px 18px}
.task-item{border-radius:16px;border:1.5px solid var(--border);background:white;transition:all .25s;overflow:hidden}
.task-item.completed-task{border-color:#a7f3d0;background:rgba(240,253,244,.6)}
.task-top{display:flex;align-items:flex-start;gap:13px;padding:13px 15px;cursor:pointer}
.check-btn{flex-shrink:0;width:28px;height:28px;border-radius:50%;border:2px solid #cbd5e1;background:white;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;outline:none;margin-top:1px}
.check-btn.checked{background:linear-gradient(135deg,#34d399,#059669);border-color:#059669;box-shadow:0 0 14px rgba(5,150,105,.35)}
.task-text{font-size:13.5px;line-height:1.55;flex:1;font-weight:600;transition:all .2s}
.task-text.done{text-decoration:line-through;color:var(--text3);font-weight:400}
.task-badge{display:inline-block;padding:1px 7px;border-radius:6px;font-size:11px;font-weight:800;margin-right:7px;vertical-align:middle}
.task-actions{padding:0 15px 13px;display:flex;flex-direction:column;gap:10px}
.task-remark-input{width:100%;padding:9px 13px;font-size:13px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface2);outline:none;color:var(--text);transition:all .2s}
.task-remark-input:focus{border-color:var(--indigo-mid);background:white;box-shadow:0 0 0 3px rgba(129,140,248,.15)}
.upload-section{border:2px dashed #c7d2fe;border-radius:12px;padding:11px 13px;background:var(--indigo-light);cursor:pointer;transition:all .2s;position:relative;flex:1;min-width:150px}
.upload-section:hover{border-color:var(--indigo);background:#e0e7ff}
.upload-section input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-label{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--indigo);pointer-events:none}
.upload-hint{font-size:10px;color:var(--indigo-mid);font-weight:500;margin-top:2px}
.view-files-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;background:linear-gradient(to bottom,#818cf8,#4f46e5);color:white;border:none;border-radius:10px;flex-shrink:0;box-shadow:0 4px 0 #3730a3,0 6px 12px rgba(79,70,229,.3);transition:all .12s;outline:none;white-space:nowrap}
.view-files-btn:active{box-shadow:0 0 0 #3730a3;transform:translateY(4px)}
.view-files-btn.no-files{background:linear-gradient(to bottom,#e2e8f0,#cbd5e1);color:#94a3b8;box-shadow:0 4px 0 #94a3b8;cursor:not-allowed}
.file-previews{display:flex;flex-wrap:wrap;gap:8px;padding:0 15px 12px}
.file-thumb{position:relative;width:68px;height:68px;border-radius:10px;overflow:hidden;border:2px solid #c7d2fe;background:white;flex-shrink:0}
.file-thumb img{width:100%;height:100%;object-fit:cover}
.file-thumb-doc{width:68px;height:68px;border-radius:10px;border:2px solid #c7d2fe;background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px;flex-shrink:0}
.file-ext-badge{font-size:10px;font-weight:800;color:var(--indigo);background:var(--indigo-light);padding:2px 6px;border-radius:4px;font-family:'IBM Plex Mono',monospace}
.file-name-sm{font-size:9px;color:var(--text3);font-weight:600;text-align:center;word-break:break-all;max-height:26px;overflow:hidden}
.remove-file-btn{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.65);border:none;color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;font-size:11px;outline:none}
.completed-meta{display:flex;align-items:center;gap:7px;padding:0 15px 12px;flex-wrap:wrap}
.meta-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;background:var(--green-light);color:#065f46;border:1px solid #a7f3d0}
.evidence-tag{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:5px 10px;border-radius:8px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;cursor:pointer;transition:all .2s;white-space:nowrap}
.evidence-tag:hover{background:#dbeafe}

/* FILE VIEWER */
.fv-overlay{position:fixed;inset:0;z-index:90;background:rgba(5,10,20,.93);backdrop-filter:blur(16px);display:flex;flex-direction:column;animation:fadeUp .2s ease forwards}
.fv-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.1);flex-shrink:0}
.fv-title{color:white;font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px}
.fv-sub{color:#94a3b8;font-size:11px;font-weight:600;margin-top:2px}
.fv-close{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;outline:none}
.fv-close:hover{background:rgba(255,255,255,.2)}
.fv-main{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px;max-width:760px;width:100%;margin:0 auto}
.fv-item{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;overflow:hidden}
.fv-item-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(255,255,255,.05)}
.fv-item-name{color:#e2e8f0;font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:10px}
.fv-item-ext{background:var(--indigo);color:white;font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;font-family:'IBM Plex Mono',monospace}
.fv-img{width:100%;max-height:420px;object-fit:contain;display:block;background:#000}
.fv-doc-body{padding:24px 20px;text-align:center;color:#94a3b8}
.fv-delete-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;font-size:11px;font-weight:700;background:rgba(220,38,38,.2);color:#fca5a5;border:1px solid rgba(220,38,38,.3);border-radius:7px;cursor:pointer;outline:none;transition:all .2s}
.fv-delete-btn:hover{background:rgba(220,38,38,.4);color:white}

/* TOAST */
.toast-wrap{position:fixed;bottom:24px;left:0;right:0;z-index:100;display:flex;justify-content:center;padding:0 16px;pointer-events:none;animation:toastIn .35s ease forwards}
.toast{background:rgba(15,23,42,.93);backdrop-filter:blur(20px);color:white;padding:14px 18px;border-radius:18px;display:flex;align-items:center;gap:13px;max-width:430px;width:100%;border:1px solid rgba(100,116,139,.4);box-shadow:0 20px 50px rgba(0,0,0,.45);pointer-events:auto}
.toast-icon{padding:8px 10px;border-radius:11px;flex-shrink:0;display:flex}

/* SUMMARY MODAL */
.modal-overlay-bottom{position:fixed;inset:0;z-index:80;background:rgba(15,23,42,.65);backdrop-filter:blur(12px);display:flex;align-items:flex-end;justify-content:center;animation:fadeUp .2s ease forwards}
.modal-sheet{background:#f8fafc;width:100%;max-width:700px;height:88vh;border-radius:24px 24px 0 0;box-shadow:0 -24px 60px rgba(0,0,0,.4);display:flex;flex-direction:column;overflow:hidden;border:1px solid rgba(255,255,255,.2);animation:fadeUp .3s cubic-bezier(.22,1,.36,1) forwards}
.modal-body-full{flex:1;overflow-y:auto;padding:20px}
.modal-close{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;outline:none}
.stat-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
.stat-card{background:white;padding:20px 16px;border-radius:22px;border:1px solid var(--border);box-shadow:var(--shadow-sm);display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px}
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:13px;padding-left:3px}
.section-stripe{width:9px;height:26px;border-radius:99px;flex-shrink:0}
.section-title{font-weight:900;font-size:15px;color:var(--text)}
.section-badge{font-size:12px;font-weight:800;padding:2px 10px;border-radius:7px;margin-left:6px}
.modal-task-item{background:white;padding:13px 16px;border-radius:16px;border:1px solid var(--border);display:flex;align-items:flex-start;gap:11px;box-shadow:var(--shadow-sm);margin-bottom:9px}
.modal-task-item.done-item{background:linear-gradient(to right,rgba(240,253,244,.6),white);border-color:#a7f3d0}
.copy-btn{flex-shrink:0;padding:7px 9px;border-radius:9px;background:white;border:1px solid var(--border);color:var(--text3);cursor:pointer;display:flex;transition:all .2s;outline:none}
.copy-btn:hover{background:var(--indigo);color:white;border-color:var(--indigo)}
.empty-state{background:white;padding:24px;border-radius:20px;border:1px solid var(--border);text-align:center;color:var(--text3);font-weight:600;font-size:14px}

@media(max-width:480px){.db-pct{font-size:48px}.btn-report span{display:none}}
</style>
</head>
<body>

<div id="loading-screen">

var MAX_SCORE=70;
var SHARED_KEY='wsp_shared_v1';
var SESSION_KEY='wsp_session_name';

// ── STATE ──
var sharedData=null; // {cats, members}
var myName='';
var expanded=[1];
var showSummary=false;
var showTeam=false;
var saveTimer=null;

// ── COLORS ──
var COLORS=['#4f46e5','#059669','#dc2626','#d97706','#7c3aed','#0891b2','#be185d','#65a30d','#c2410c','#0369a1'];
function colorFor(n){var h=0;for(var i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))%COLORS.length;return COLORS[h];}

// ══════════════════════════════════════════════════════
//  SHARED STORAGE
// ══════════════════════════════════════════════════════
async function loadShared(){
  try{var r=await window.storage.get(SHARED_KEY,true);return r?JSON.parse(r.value):null;}catch(e){return null;}
}
async function saveShared(d){
  try{await window.storage.set(SHARED_KEY,JSON.stringify(d),true);}catch(e){}
}

function buildFresh(){
  return {
    cats:INITIAL_TASKS.map(function(cat){
      return {id:cat.id,title:cat.title,remark:'',
        tasks:cat.tasks.map(function(t){return {id:t.id,text:t.text,completed:false,remark:'',files:[],reporter:'',reportDate:''};})

      };
    }),
    members:{}
  };
}

function mergeSaved(saved){
  return {
    members:saved.members||{},
    cats:INITIAL_TASKS.map(function(cat){
      var sc=saved.cats.find(function(c){return c.id===cat.id;});
      if(!sc) return {id:cat.id,title:cat.title,remark:'',tasks:cat.tasks.map(function(t){return {id:t.id,text:t.text,completed:false,remark:'',files:[],reporter:'',reportDate:''};})};
      return {id:cat.id,title:cat.title,remark:sc.remark||'',
        tasks:cat.tasks.map(function(t){
          var st=sc.tasks.find(function(x){return x.id===t.id;});
          return st?Object.assign({},st,{text:t.text}):{id:t.id,text:t.text,completed:false,remark:'',files:[],reporter:'',reportDate:''};
        })
      };
    })
  };
}

function persist(){
  if(saveTimer) clearTimeout(saveTimer);
  badge('saving');
  saveTimer=setTimeout(async function(){
    await saveShared(sharedData);
    badge('saved');
    setTimeout(function(){badge('idle');},2000);
  },600);
}

function badge(state){
  var b=document.getElementById('save-badge');if(!b)return;
  if(state==='saving'){b.className='save-badge saving';b.innerHTML=I('loader',13)+' กำลังบันทึก...';}
  else if(state==='saved'){b.className='save-badge saved';b.innerHTML=I('check',13)+' บันทึกแล้ว';}
  else{b.className='save-badge idle';b.innerHTML=I('cloud',13)+' ซิงค์อัตโนมัติ';}
}

function touchMe(){
  if(!myName)return;
  if(!sharedData.members)sharedData.members={};
  sharedData.members[myName]={lastSeen:new Date().toISOString(),color:colorFor(myName)};
}

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function today(){var d=new Date();return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();}
function timeAgo(iso){
  if(!iso)return'';
  var diff=Math.floor((Date.now()-new Date(iso).getTime())/1000);
  if(diff<60)return'เมื่อกี้';
  if(diff<3600)return Math.floor(diff/60)+' นาทีที่แล้ว';
  if(diff<86400)return Math.floor(diff/3600)+' ชม.ที่แล้ว';
  return Math.floor(diff/86400)+' วันที่แล้ว';
}
function isImg(n){return /\.(jpg|jpeg|png|gif|webp|bmp|svg)$/i.test(n);}
function ext(n){return(n.split('.').pop()||'file').toLowerCase();}
function toDataURL(file,cb){var r=new FileReader();r.onload=function(e){cb(e.target.result);};r.readAsDataURL(file);}

var _toastT=null;
function toast(title,msg,col){
  col=col||'#34d399';
  var old=document.getElementById('_toast');if(old)old.remove();
  var w=document.createElement('div');w.id='_toast';w.className='toast-wrap';
  w.innerHTML='<div class="toast"><div class="toast-icon" style="background:'+col+';color:white;border-radius:11px">'+I('checkCi',20)+'</div><div style="flex:1;min-width:0"><div style="font-weight:800;font-size:14px">'+esc(title)+'</div><div style="color:#94a3b8;font-size:12px;margin-top:3px">'+esc(msg)+'</div></div><button style="width:28px;height:28px;border-radius:50%;background:rgba(30,41,59,.8);border:1px solid rgba(100,116,139,.4);color:#94a3b8;display:flex;align-items:center;justify-content:center;cursor:pointer;outline:none" onclick="this.parentElement.parentElement.remove()">'+I('x',13)+'</button></div>';
  document.body.appendChild(w);
  if(_toastT)clearTimeout(_toastT);
  _toastT=setTimeout(function(){if(w.parentNode)w.remove();},3200);
}

function stats(){
  var t=0,d=0;
  sharedData.cats.forEach(function(c){t+=c.tasks.length;d+=c.tasks.filter(function(x){return x.completed;}).length;});
  return{total:t,done:d,pct:Math.round((d/t)*100)||0,score:((d/t)*MAX_SCORE).toFixed(1)};
}

//  RENDER FULL
// ══════════════════════════════════════════════════════

    '<div id="save-badge" class="save-badge idle">'+I('cloud',13)+' ซิงค์อัตโนมัติ</div>'+
  '</div></header>'+
  '<div style="padding-bottom:80px"><main class="container">'+

  // EMP BANNER
  '<div class="emp-banner fade-up" style="margin-top:20px">'+
    '<div class="emp-top-row">'+
      '<div class="emp-avatar" id="emp-av">'+(myName?esc(myName.charAt(0).toUpperCase()):'?')+'</div>'+
      '<div class="emp-fields">'+
        '<div class="emp-label">'+I('user',12)+' ระบุชื่อผู้กรอกข้อมูลของคุณ</div>'+
        '<div class="emp-row">'+
          '<input class="emp-input" id="emp-in" type="text" placeholder="ชื่อ-นามสกุล แล้วกด ยืนยัน" value="'+esc(myName)+'" oninput="myName=this.value;var av=document.getElementById(\'emp-av\');if(av)av.textContent=this.value?this.value.charAt(0).toUpperCase():\'?\'" onkeydown="if(event.key===\'Enter\')confirmEmp()" />'+
          '<button class="btn-confirm" onclick="confirmEmp()">ยืนยัน</button>'+

        '</div>'+

// ══════════════════════════════════════════════════════
//  RENDER CATEGORIES
// ══════════════════════════════════════════════════════
function renderCats(){
  return sharedData.cats.map(function(cat,idx){
    var done=cat.tasks.filter(function(t){return t.completed;}).length;
    var pct=Math.round((done/cat.tasks.length)*100);
    var isExp=expanded.includes(cat.id);
    var allDone=done===cat.tasks.length;
    var ik=CAT_ICONS[idx]||'trend';
    var ibg=allDone?'linear-gradient(135deg,#34d399,#059669)':isExp?'linear-gradient(135deg,#4f46e5,#3b82f6)':'linear-gradient(135deg,#e2e8f0,#f1f5f9)';
    var ic2=allDone||isExp?'white':'#94a3b8';
    var fc=allDone?'linear-gradient(to right,#34d399,#10b981)':'linear-gradient(to right,#22d3ee,#4f46e5)';
    return '<div class="cat-card'+(allDone?' done':(isExp?' expanded':''))+'">'+
      '<div class="cat-header" onclick="toggleCat('+cat.id+')">'+
        '<div class="cat-icon-wrap" style="background:'+ibg+';color:'+ic2+'">'+I(ik,18)+'</div>'+
        '<div class="cat-info">'+
          '<div class="cat-title" style="color:'+(allDone?'#065f46':isExp?'#312e81':'var(--text)')+'">'+esc(cat.title)+'</div>'+
          '<div class="cat-progress-row">'+
            '<div class="mini-track"><div class="mini-fill" style="background:'+fc+';width:'+pct+'%"></div></div>'+
            '<span class="cat-count">'+done+'/'+cat.tasks.length+'</span>'+
            '<span class="cat-pct" style="color:'+(allDone?'var(--green)':'var(--indigo)')+';background:'+(allDone?'var(--green-light)':'var(--indigo-light)')+'">'+pct+'%</span>'+
          '</div>'+
        '</div>'+
        '<div class="chevron" style="background:'+(isExp?'var(--indigo-light)':'var(--bg)')+'">'+I(isExp?'up':'down',18)+'</div>'+
      '</div>'+
      '<div class="accordion-body" style="max-height:'+(isExp?'5000px':'0')+';opacity:'+(isExp?1:0)+'">'+
        (!allDone?'<div class="cat-remark-box"><div class="remark-label">'+I('alert',13)+' ปัญหา/หมายเหตุภาพรวมหมวดหมู่</div><textarea class="remark-textarea" rows="2" placeholder="ระบุสาเหตุที่ยังดำเนินการไม่ครบถ้วน..." oninput="setCatRemark('+cat.id+',this.value)">'+esc(cat.remark||'')+'</textarea></div>':'')+
        '<div class="task-list">'+cat.tasks.map(function(t){return renderTask(cat.id,t);}).join('')+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

// ══════════════════════════════════════════════════════
//  RENDER TASK
// ══════════════════════════════════════════════════════
function renderTask(catId,task){
  var hf=task.files&&task.files.length>0;
  var bb=task.completed?'#f1f5f9':'linear-gradient(to bottom,#eef2ff,#e0e7ff)';
  var bc=task.completed?'#94a3b8':'#4f46e5';

  // thumbs strip (shown in edit mode and completed)
  function makeThumbs(deletable){
    if(!hf)return'';
    var h='<div class="file-previews">';
    task.files.forEach(function(f,fi){
      if(f.isImage){
        h+='<div class="file-thumb"><img src="'+f.data+'" alt="'+esc(f.name)+'">'+
          (deletable?'<button class="remove-file-btn" onclick="rmFile(event,'+catId+',\''+esc(task.id)+'\','+fi+')">✕</button>':'')+
        '</div>';
      }else{
        h+='<div class="file-thumb-doc"><div class="file-ext-badge">'+esc(ext(f.name).toUpperCase())+'</div><div class="file-name-sm">'+esc(f.name)+'</div>'+
          (deletable?'<button style="margin-top:3px;background:#fee2e2;color:#dc2626;border:1px solid #fecaca;border-radius:4px;font-size:9px;font-weight:700;padding:1px 5px;cursor:pointer;outline:none" onclick="rmFile(event,'+catId+',\''+esc(task.id)+'\','+fi+')">ลบ</button>':'')+
        '</div>';
      }
    });
    return h+'</div>';
  }

  var meta='';
  if(task.completed){
    meta='<div class="completed-meta">';
    if(task.reporter){var col=colorFor(task.reporter);meta+='<div class="meta-tag" style="background:'+col+'18;color:'+col+';border-color:'+col+'44"><div style="width:18px;height:18px;border-radius:50%;background:'+col+';color:white;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;flex-shrink:0">'+esc(task.reporter.charAt(0).toUpperCase())+'</div>'+esc(task.reporter)+'</div>';}
    if(task.reportDate)meta+='<div class="meta-tag">'+I('calendar',11)+' '+esc(task.reportDate)+'</div>';
    if(hf)meta+='<div class="evidence-tag" onclick="openFV(event,'+catId+',\''+task.id+'\')">'+I('img',12)+' หลักฐาน '+task.files.length+' ไฟล์ – ดู</div>';
    meta+='</div>';
  }

  return '<div class="task-item'+(task.completed?' completed-task':'')+'">'+
    '<div class="task-top" onclick="toggleTask('+catId+',\''+task.id+'\')">'+
      '<button class="check-btn'+(task.completed?' checked':'')+'" tabindex="-1">'+I('check',14)+'</button>'+
      '<div class="task-text'+(task.completed?' done':'')+'">'+
        '<span class="task-badge" style="background:'+bb+';color:'+bc+';border:1px solid '+(task.completed?'#e2e8f0':'#c7d2fe')+'">'+esc(task.id)+'</span>'+esc(task.text)+
      '</div>'+
      (hf&&task.completed?'<div class="evidence-tag" style="margin-left:4px;flex-shrink:0" onclick="openFV(event,'+catId+',\''+task.id+'\')">'+I('img',11)+' '+task.files.length+'</div>':'<div style="flex-shrink:0"></div>')+
    '</div>'+
    meta+
    (task.completed?makeThumbs(false):'')+
    (!task.completed?
      '<div class="task-actions">'+
        '<input class="task-remark-input" type="text" placeholder="หมายเหตุย่อย..." value="'+esc(task.remark||'')+'" oninput="setTaskRemark('+catId+',\''+task.id+'\',this.value)" onclick="event.stopPropagation()" />'+
        '<div style="display:flex;gap:8px;align-items:stretch;flex-wrap:wrap">'+
          '<div class="upload-section" onclick="event.stopPropagation()">'+
            '<input type="file" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt" multiple capture="environment" onchange="addFiles(event,'+catId+',\''+task.id+'\')" />'+
            '<div class="upload-label">'+I('upload',15)+'<span>ถ่ายภาพ / เลือกไฟล์หลักฐาน</span>'+(hf?'<span style="margin-left:auto;background:var(--indigo);color:white;padding:2px 7px;border-radius:5px;font-size:10px;flex-shrink:0">'+task.files.length+'</span>':'')+
            '</div><div class="upload-hint">กล้อง · PNG · JPG · PDF · Word · Excel (≤10MB)</div>'+
          '</div>'+
          '<button class="view-files-btn'+(hf?'':' no-files')+'" onclick="'+(hf?'openFV(event,'+catId+',\''+task.id+'\')':'event.stopPropagation()')+'" title="'+(hf?'ดูไฟล์ที่อัปโหลด':'ยังไม่มีไฟล์')+'">'+
            I('img',15)+' ดูไฟล์'+(hf?'<span style="background:rgba(255,255,255,.25);border-radius:5px;padding:1px 6px;font-size:10px;margin-left:2px">'+task.files.length+'</span>':'')+
          '</button>'+
        '</div>'+
        makeThumbs(true)+
      '</div>'
    :'')+
  '</div>';
}

    '</div>'+
  '</div>';
}

            '<span style="width:14px;height:14px;border-radius:50%;background:'+col+';color:white;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;flex-shrink:0">'+esc(t.reporter.charAt(0).toUpperCase())+'</span>'+esc(t.reporter)+'</span>':'')+
          (t.reportDate?'<span style="font-size:10px;padding:2px 9px;border-radius:6px;border:1px solid #a7f3d0;background:var(--green-light);color:#065f46;font-weight:600">'+esc(t.reportDate)+'</span>':'')+

// ══════════════════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════════════════
window.confirmEmp=function(){
  var v=(document.getElementById('emp-in')||{}).value||'';
  if(!v.trim()){toast('⚠️ กรุณาระบุชื่อ','พิมพ์ชื่อ-นามสกุลก่อนกดยืนยัน','#f97316');return;}
  myName=v.trim();
  try{sessionStorage.setItem(SESSION_KEY,myName);}catch(e){}
  touchMe(); persist(); render();
  toast('👋 ยินดีต้อนรับ',myName+' เข้าสู่ระบบแล้ว');
};

window.toggleCat=function(id){
  var i=expanded.indexOf(id);if(i>-1)expanded.splice(i,1);else expanded.push(id);
  var el=document.getElementById('cat-list');if(el)el.innerHTML=renderCats();
};

window.toggleTask=function(catId,taskId){
  if(!myName){toast('⚠️ กรุณาระบุชื่อก่อน','พิมพ์ชื่อแล้วกด "ยืนยัน" ก่อนกรอกข้อมูล','#f97316');return;}
  sharedData.cats=sharedData.cats.map(function(c){
    if(c.id!==catId)return c;
    return Object.assign({},c,{tasks:c.tasks.map(function(t){
      if(t.id!==taskId)return t;
      var next=!t.completed;
      var nt=Object.assign({},t,{completed:next});
      if(next){nt.reporter=myName;nt.reportDate=today();setTimeout(function(){toast('✅ บันทึกแล้ว','"'+(t.text.length>38?t.text.slice(0,38)+'…':t.text)+'" เสร็จสิ้น');},30);}
      return nt;
    })});
  });
  touchMe();persist();
  var el=document.getElementById('cat-list');if(el)el.innerHTML=renderCats();
};

window.setCatRemark=function(id,v){
  sharedData.cats=sharedData.cats.map(function(c){return c.id===id?Object.assign({},c,{remark:v}):c;});
  touchMe();persist();
};

window.setTaskRemark=function(catId,taskId,v){
  sharedData.cats=sharedData.cats.map(function(c){
    if(c.id!==catId)return c;
    return Object.assign({},c,{tasks:c.tasks.map(function(t){return t.id===taskId?Object.assign({},t,{remark:v}):t;})});
  });
  touchMe();persist();
};

window.addFiles=function(event,catId,taskId){
  event.stopPropagation();
  var files=event.target.files;if(!files||!files.length)return;
  var nf=[],arr=Array.prototype.slice.call(files),left=arr.length;
  arr.forEach(function(file){
    if(file.size>10*1024*1024){toast('⚠️ ไฟล์ใหญ่เกิน','ไม่เกิน 10MB ต่อไฟล์','#f97316');left--;if(!left)done2();return;}
    toDataURL(file,function(d){nf.push({name:file.name,data:d,isImage:isImg(file.name),size:file.size});left--;if(!left)done2();});
  });
  function done2(){
    sharedData.cats=sharedData.cats.map(function(c){
      if(c.id!==catId)return c;
      return Object.assign({},c,{tasks:c.tasks.map(function(t){return t.id===taskId?Object.assign({},t,{files:(t.files||[]).concat(nf)}):t;})});
    });
    touchMe();persist();
    var el=document.getElementById('cat-list');if(el)el.innerHTML=renderCats();
    toast('📎 เพิ่มไฟล์แล้ว','อัปโหลด '+nf.length+' ไฟล์สำเร็จ');
  }
};

window.rmFile=function(event,catId,taskId,fi){
  event.stopPropagation();
  sharedData.cats=sharedData.cats.map(function(c){
    if(c.id!==catId)return c;
    return Object.assign({},c,{tasks:c.tasks.map(function(t){return t.id===taskId?Object.assign({},t,{files:(t.files||[]).filter(function(_,i){return i!==fi;})}):t;})});
  });
  touchMe();persist();
  var el=document.getElementById('cat-list');if(el)el.innerHTML=renderCats();
};

window.openFV=function(event,catId,taskId){
  event.stopPropagation();
  var cat=sharedData.cats.find(function(c){return c.id===catId;});if(!cat)return;
  var task=cat.tasks.find(function(t){return t.id===taskId;});if(!task||!task.files||!task.files.length)return;
  var old=document.getElementById('_fv');if(old)old.remove();
  var fh=task.files.map(function(f,fi){
    var e2=ext(f.name).toUpperCase();
    var body=f.isImage?'<img class="fv-img" src="'+f.data+'" alt="'+esc(f.name)+'">'
      :'<div class="fv-doc-body"><div style="font-size:42px">📄</div><div style="font-size:14px;font-weight:700;color:#e2e8f0;margin:8px 0;word-break:break-all">'+esc(f.name)+'</div>'+(f.size?'<div style="font-size:11px;color:#64748b">'+Math.round(f.size/1024)+' KB</div>':'')+'<a href="'+f.data+'" download="'+esc(f.name)+'" style="display:inline-flex;align-items:center;gap:6px;margin-top:14px;padding:9px 18px;background:var(--indigo);color:white;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none">'+I('upload',14)+' ดาวน์โหลด</a></div>';
    return '<div class="fv-item"><div class="fv-item-header"><div class="fv-item-name">'+esc(f.name)+'</div><div style="display:flex;align-items:center;gap:8px"><span class="fv-item-ext">'+esc(e2)+'</span><button class="fv-delete-btn" onclick="fvDel('+catId+',\''+esc(taskId)+'\','+fi+')">'+I('x',12)+' ลบ</button></div></div>'+body+'</div>';
  }).join('');
  var div=document.createElement('div');div.id='_fv';div.className='fv-overlay';
  div.innerHTML='<div class="fv-header"><div><div class="fv-title">'+I('img',18)+' ไฟล์หลักฐาน – '+esc(task.id)+'</div><div class="fv-sub">'+esc(task.text.length>55?task.text.slice(0,55)+'…':task.text)+'</div></div><button class="fv-close" onclick="document.getElementById(\'_fv\').remove()">'+I('x',18)+'</button></div><div class="fv-main">'+fh+'</div>';
  div.addEventListener('click',function(e){if(e.target===div)div.remove();});
  document.body.appendChild(div);
};

window.fvDel=function(catId,taskId,fi){
  if(!confirm('ลบไฟล์นี้?'))return;
  sharedData.cats=sharedData.cats.map(function(c){
    if(c.id!==catId)return c;
    return Object.assign({},c,{tasks:c.tasks.map(function(t){return t.id===taskId?Object.assign({},t,{files:(t.files||[]).filter(function(_,i){return i!==fi;})}):t;})});
  });
  touchMe();persist();
  var el=document.getElementById('cat-list');if(el)el.innerHTML=renderCats();
  var task=null;sharedData.cats.forEach(function(c){c.tasks.forEach(function(t){if(c.id===catId&&t.id===taskId)task=t;});});
  if(task&&task.files&&task.files.length)openFV({stopPropagation:function(){}},catId,taskId);
  else{var fv=document.getElementById('_fv');if(fv)fv.remove();}
  toast('🗑️ ลบไฟล์แล้ว','');
};

window.openSummary=function(){showSummary=true;render();};
window.closeSummary=function(){showSummary=false;render();};
window.openTeam=function(){showTeam=true;render();};
window.closeTeam=function(){showTeam=false;render();};

window.doCopy=function(txt){
  var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');toast('📋 คัดลอกแล้ว','');}catch(e){}
  document.body.removeChild(ta);
};

// ══════════════════════════════════════════════════════
(async function(){
  try{var s=sessionStorage.getItem(SESSION_KEY);if(s)myName=s;}catch(e){}
  var saved=await loadShared();
  sharedData=saved?mergeSaved(saved):buildFresh();
  if(myName){touchMe();await saveShared(sharedData);}
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('root').style.display='';
  render();
  // Poll every 30s for updates from other users
  setInterval(async function(){
    var fresh=await loadShared();
    if(!fresh)return;
    sharedData=mergeSaved(fresh);
    if(myName)touchMe();
    var el=document.getElementById('cat-list');if(el)el.innerHTML=renderCats();
    // refresh header team bar
    var tb=document.querySelector('.team-bar');
    if(tb){
      var members=sharedData.members||{};
      var names=Object.keys(members);
      var chips=names.length===0?'<span style="font-size:12px;color:var(--text3);font-style:italic">ยังไม่มีผู้กรอกข้อมูล</span>':names.map(function(n){var m=members[n],col=m.color||colorFor(n),isMe=n===myName;return '<div class="team-chip'+(isMe?' me':'')+'" onclick="openTeam()" title="'+esc(n)+'"><div class="team-chip-av" style="background:'+col+'">'+esc(n.charAt(0).toUpperCase())+'</div>'+esc(n)+'<span class="team-chip-time">· '+timeAgo(m.lastSeen)+'</span></div>';}).join('');
      var av=tb.querySelector('.team-avatars');if(av)av.innerHTML=chips;
      var lbl=tb.querySelector('.team-bar-label');if(lbl)lbl.innerHTML=I('users',13)+' ทีมงานทั้งหมด ('+names.length+' คน)<button class="btn-team" onclick="openTeam()" style="margin-left:auto">'+I('users',13)+' ดูรายชื่อและสถิติ</button>';
    }
  },30000);
})();
</script>
</body>
</html>
